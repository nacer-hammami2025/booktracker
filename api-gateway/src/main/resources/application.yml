server:
  port: 8080

spring:
  application:
    name: api-gateway
  
  cloud:
    gateway:
      # Configuration CORS globale
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      
      # Routes vers les microservices
      routes:
        # ==================== AUTH SERVICE ====================
        - id: auth-service-register
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/register
            - Method=POST
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/$\{segment}
        
        - id: auth-service-login
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/login
            - Method=POST
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/$\{segment}
        
        - id: auth-service-profile
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/$\{segment}
            - AuthenticationFilter
        
        # ==================== BOOK SERVICE ====================
        - id: book-service-public
          uri: http://localhost:8082
          predicates:
            - Path=/api/books/search, /api/books/{id}
            - Method=GET
          filters:
            - RewritePath=/api/books/(?<segment>.*), /api/books/$\{segment}
        
        - id: book-service-protected
          uri: http://localhost:8082
          predicates:
            - Path=/api/books/**
          filters:
            - RewritePath=/api/books/(?<segment>.*), /api/books/$\{segment}
            - AuthenticationFilter
        
        # ==================== TRACKER SERVICE ====================
        - id: tracker-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/tracker/**
          filters:
            - RewritePath=/api/tracker/(?<segment>.*), /api/tracker/$\{segment}
            - AuthenticationFilter
        
        # ==================== RECO SERVICE ====================
        - id: reco-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/recommendations/**
          filters:
            - RewritePath=/api/recommendations/(?<segment>.*), /api/recommendations/$\{segment}
            - AuthenticationFilter
        
        - id: reco-service-stats
          uri: http://localhost:8084
          predicates:
            - Path=/api/statistics/**
          filters:
            - RewritePath=/api/statistics/(?<segment>.*), /api/statistics/$\{segment}
            - AuthenticationFilter

      # Routes publiques (health checks)
      default-filters:
        - name: Retry
          args:
            retries: 3
            methods: GET
            backoff:
              firstBackoff: 50ms
              maxBackoff: 500ms

# Configuration JWT
jwt:
  secret: ${JWT_SECRET:booktracker-super-secret-key-change-in-production-minimum-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    root: INFO
    com.booktracker.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
