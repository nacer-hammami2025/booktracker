# Render Blueprint pour BookTracker
# Déploiement automatique sur Render.com

services:
  # Frontend React
  - type: web
    name: booktracker-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # API Gateway (Spring Cloud Gateway)
  - type: web
    name: booktracker-gateway
    env: docker
    dockerfilePath: ./Dockerfile.gateway
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8080
      - key: AUTH_SERVICE_URL
        value: http://booktracker-auth:8081
      - key: BOOK_SERVICE_URL
        value: http://booktracker-book:8082
      - key: TRACKER_SERVICE_URL
        value: http://booktracker-tracker:8083
      - key: RECO_SERVICE_URL
        value: http://booktracker-reco:8084
      - key: CORS_ALLOWED_ORIGINS
        value: https://booktracker.nacer-dev.me,https://nacer-dev.me
    healthCheckPath: /actuator/health

  # Auth Service
  - type: web
    name: booktracker-auth
    env: docker
    dockerfilePath: ./Dockerfile.auth
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8081
      - key: DB_HOST
        fromDatabase:
          name: booktracker-auth-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: booktracker-auth-db
          property: port
      - key: DB_NAME
        value: auth_db
      - key: DB_USER
        fromDatabase:
          name: booktracker-auth-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: booktracker-auth-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
    healthCheckPath: /actuator/health

  # Book Service
  - type: web
    name: booktracker-book
    env: docker
    dockerfilePath: ./Dockerfile.book
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8082
      - key: DB_HOST
        fromDatabase:
          name: booktracker-book-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: booktracker-book-db
          property: port
      - key: DB_NAME
        value: book_db
      - key: DB_USER
        fromDatabase:
          name: booktracker-book-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: booktracker-book-db
          property: password
    healthCheckPath: /actuator/health

  # Tracker Service
  - type: web
    name: booktracker-tracker
    env: docker
    dockerfilePath: ./Dockerfile.tracker
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8083
      - key: DB_HOST
        fromDatabase:
          name: booktracker-tracker-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: booktracker-tracker-db
          property: port
      - key: DB_NAME
        value: tracker_db
      - key: DB_USER
        fromDatabase:
          name: booktracker-tracker-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: booktracker-tracker-db
          property: password
      - key: BOOK_SERVICE_URL
        value: http://booktracker-book:8082
      - key: AUTH_SERVICE_URL
        value: http://booktracker-auth:8081
    healthCheckPath: /actuator/health

  # Reco Service
  - type: web
    name: booktracker-reco
    env: docker
    dockerfilePath: ./Dockerfile.reco
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8084
      - key: DB_HOST
        fromDatabase:
          name: booktracker-reco-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: booktracker-reco-db
          property: port
      - key: DB_NAME
        value: reco_db
      - key: DB_USER
        fromDatabase:
          name: booktracker-reco-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: booktracker-reco-db
          property: password
      - key: REDIS_HOST
        fromService:
          name: booktracker-redis
          type: redis
          property: host
      - key: REDIS_PORT
        value: 6379
      - key: BOOK_SERVICE_URL
        value: http://booktracker-book:8082
      - key: TRACKER_SERVICE_URL
        value: http://booktracker-tracker:8083
    healthCheckPath: /actuator/health

databases:
  - name: booktracker-auth-db
    databaseName: auth_db
    user: auth_user
    plan: free

  - name: booktracker-book-db
    databaseName: book_db
    user: book_user
    plan: free
    postgresMajorVersion: 16

  - name: booktracker-tracker-db
    databaseName: tracker_db
    user: tracker_user
    plan: free

  - name: booktracker-reco-db
    databaseName: reco_db
    user: reco_user
    plan: free

# Redis pour les recommandations (cache)
# Note: Render ne supporte pas Redis dans render.yaml
# Vous devrez créer manuellement dans l'interface Render
