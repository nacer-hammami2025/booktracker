server:
  port: 8082

spring:
  application:
    name: book-service
  datasource:
    url: jdbc:postgresql://localhost:5433/book_db
    username: book_user
    password: book_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

google:
  books:
    api:
      key: ${GOOGLE_BOOKS_API_KEY:}
      url: https://www.googleapis.com/books/v1

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    root: INFO
    com.booktracker.book: DEBUG
